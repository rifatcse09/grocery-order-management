# MySQL data lives in Docker volume `mysql_data`. To wipe ALL DB data and start clean:
#   ./scripts/docker-reset-mysql.sh
#   or:  docker compose down -v && docker compose up -d --build
# If the UI still shows old orders, the browser is calling a different API — fix frontend/.env VITE_API_BASE_URL.

services:
  mysql:
    image: mysql:8.0
    container_name: gom_mysql
    restart: unless-stopped
    # Alpine MariaDB clients (mysqldump in backend image) cannot load caching_sha2_password.so against MySQL 8.
    # This plugin lets mysqldump/mariadb-dump connect. Existing volumes: ALTER USER 'gom'@'%' IDENTIFIED WITH mysql_native_password BY 'gom_secret';
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_DATABASE: gom
      MYSQL_USER: gom
      MYSQL_PASSWORD: gom_secret
      MYSQL_ROOT_PASSWORD: gom_root_secret
    ports:
      - "53306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pgom_root_secret"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gom_backend
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: gom
      DB_USERNAME: gom
      DB_PASSWORD: gom_secret
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh -c "php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=8000"

volumes:
  mysql_data:
